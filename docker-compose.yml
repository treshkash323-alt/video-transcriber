services:
  redis:
    image: redis:7-alpine
    networks: [app-net]
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - '8000:8000'
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./models_cache:/root/.cache/huggingface
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-net

  worker:
    build: .
    command: celery -A app.tasks worker --loglevel=info --concurrency=1 -E
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./models_cache:/root/.cache/huggingface
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-net

  # Тот же образ, что worker — без рассинхрона Celery/Redis
  flower:
    build: .
    command: celery -A app.tasks flower --port=5555 --address=0.0.0.0
    ports:
      - '5555:5555'
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
